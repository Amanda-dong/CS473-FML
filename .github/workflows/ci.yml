name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-caching: true
          cache-dependency-glob: requirements.txt
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv pip install --system ruff
      - run: ruff format --check src tests
      - run: ruff check src tests

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: write
      pull-requests: write
    env:
      # Prevent import-time env-check crashes; real API tests must mock these
      GEMINI_MODEL: "gemini-2.5-flash-lite"
      GEMINI_API_KEY: "ci-placeholder"
      YELP_API_KEY: "ci-placeholder"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-caching: true
          cache-dependency-glob: requirements.txt
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv pip install --system -r requirements.txt pytest-cov
      - run: |
          python -m pytest -v --tb=short \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=50
      - name: Write coverage to Job Summary
        if: always()
        run: |
          echo "## Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          python -m coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || \
            echo "*(coverage data unavailable)*" >> "$GITHUB_STEP_SUMMARY"
      - name: Coverage diff comment on PR
        if: always()
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 75
          MINIMUM_ORANGE: 50
          COVERAGE_DATA_BRANCH: python-coverage-comment-action-data

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-caching: true
          cache-dependency-glob: requirements.txt
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv pip install --system bandit pip-audit
      - run: bandit -r src -ll -ii -f txt
      - run: pip-audit -r requirements.txt --progress-spinner=off --strict

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  commit-lint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-action@v6
        with:
          configFile: .commitlintrc.yml
          failOnWarnings: false
          helpURL: "https://www.conventionalcommits.org/"
